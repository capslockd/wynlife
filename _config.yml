# WynLife Church — Jekyll config for GitHub Pages
# This file enables Jekyll processing so that clean URLs work.
# The `layout: none` front matter in each HTML file tells Jekyll
# to output the page as-is without wrapping it in any theme layout.

title: WynLife Church
description: A vibrant, multicultural Christian community in Wyndham Vale, Melbourne's west.
url: "https://www.wynlife.com.au"
baseurl: ""

# Exclude files Jekyll should not process or publish
exclude:
  - README.md
  - push-pr.sh
  - "*.zip"

# Include these so Jekyll passes them through untouched
include:
  - assets
  - robots.txt
  - sitemap.xml

# Don't use any built-in Jekyll theme — we have our own CSS
theme: null

# Sass settings (not used but prevents warnings)
sass:
  quiet_deps: true
